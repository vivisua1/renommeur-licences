<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Activation Licence PRO</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 40px;
        }
        .box {
            max-width: 400px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            font-size: 16px;
        }
        button {
            background: #0078ff;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #005fcc;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Activer votre licence PRO</h2>

    <form action="/activate" method="POST">
        <input type="email" name="email" placeholder="Votre email" required>
        <input type="text" name="key" placeholder="Votre clé PRO" required>
        <button type="submit">Activer</button>
    </form>
</div>

</body>
</html>
